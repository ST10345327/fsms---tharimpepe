name: CI

on:
  push:
    branches:
      - main
      - 'backend/**'
      - 'frontend/**'
      - 'shared/**'
  pull_request:

jobs:
  php-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: fsms
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_FALLBACKS: fsms,fsms_database,fsms_db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Wait for MySQL
        run: |
          for i in {1..20}; do
            mysqladmin ping -h 127.0.0.1 -uroot -proot && break
            sleep 3
          done

      - name: Import schema
        run: mysql -h 127.0.0.1 -uroot -proot < sql/schema.sql

      - name: Lint PHP files
        run: |
          find app config public tests -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run test suite
        run: php tests/run_all_tests.php
